<div class="athlete-layout">
    <aside class="sidebar">
        <div class="sidebar-shell">
            <div>
                <div class="brand">
                    <div class="brand-logo">
                        <img src="assets/img/athlethe.png" alt="Logo athlete" class="brand-logo-img">
                    </div>
                    <div class="brand-text">
                        <h2>Athlète</h2>
                        <p>Dashboard sportif</p>
                    </div>
                </div>

                <nav class="nav-menu">
                    <a *ngFor="let item of menuItems" [routerLink]="item.path" routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: true }" class="nav-item standalone">
                        <span class="icon">{{ item.icon }}</span>
                        <span class="nav-label">{{ item.label }}</span>
                    </a>

                    <div class="menu-section" *ngFor="let section of menuSections">
                        <button type="button" class="section-trigger" [class.active]="isSectionActive(section)"
                            [class.open]="isSectionOpen(section.id)" (click)="toggleSection(section.id)">
                            <span class="icon">{{ section.icon }}</span>
                            <span class="section-label">{{ section.label }}</span>
                            <span class="chevron">⌄</span>
                        </button>

                        <div class="section-body" [class.open]="isSectionOpen(section.id)">
                            <div class="section-links">
                                <a *ngFor="let child of section.children" [routerLink]="child.path"
                                    routerLinkActive="active" class="sub-item">
                                    <span class="sub-dot" aria-hidden="true"></span>
                                    <span>{{ child.label }}</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="sidebar-footer">
                <button type="button" class="secondary-item">
                    <span class="icon">⚙</span>
                    <span>Paramètres</span>
                </button>
                <button class="logout-btn" (click)="openLogoutConfirm()">
                    <span class="icon">⇠</span>
                    <span>Déconnexion</span>
                </button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <section class="content-card">
            <router-outlet></router-outlet>
        </section>
    </main>

    <div class="logout-modal-overlay" *ngIf="showLogoutConfirm" (click)="closeLogoutConfirm()">
        <section class="logout-modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true"
            aria-labelledby="logout-title">
            <header class="logout-modal-header">
                <h3 id="logout-title">CONFIRMATION</h3>
                <button type="button" class="logout-close" (click)="closeLogoutConfirm()" aria-label="Fermer">
                    ×
                </button>
            </header>

            <div class="logout-modal-body">
                Êtes-vous sûr de vouloir vous déconnecter ?
            </div>

            <footer class="logout-modal-actions">
                <button type="button" class="logout-cancel" (click)="closeLogoutConfirm()">Annuler</button>
                <button type="button" class="logout-confirm" (click)="logout()">Se déconnecter</button>
            </footer>
        </section>
    </div>
</div>
