<div class="coach-layout">
    <aside class="sidebar">
        <div class="sidebar-shell">
            <div class="brand">
                <div class="brand-logo-wrap">
                    <img src="assets/img/coaches/aa.png" alt="Coach Admin logo" class="brand-logo" />
                </div>
                <div class="brand-copy">
                    <h2>CoachAdmin</h2>
                    <p>Espace</p>
                </div>
            </div>

            <nav class="nav-menu">
                <a class="nav-item" [routerLink]="'/dashboard/coach/dashboard'" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">
                    <span class="material-symbols-rounded nav-icon">space_dashboard</span>
                    <span class="nav-label">Tableau de bord</span>
                    <span class="active-dot"></span>
                </a>

                <div class="menu-section" [class.active-parent]="hasActiveRoute(usersMenuPaths)">
                    <button type="button" class="nav-item nav-toggle" (click)="toggleSection('users')"
                        [class.active]="hasActiveRoute(usersMenuPaths)">
                        <span class="material-symbols-rounded nav-icon">group</span>
                        <span class="nav-label">Utilisateurs</span>
                        <span class="material-symbols-rounded chevron"
                            [class.open]="isExpanded('users')">expand_more</span>
                    </button>

                    <div class="submenu" [class.open]="isExpanded('users') || hasSearchTerm">
                        <a *ngFor="let item of filteredUsersMenuItems" class="submenu-item" [routerLink]="item.path"
                            routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                            <span class="submenu-dot"></span>
                            <span>{{ item.label }}</span>
                        </a>
                    </div>
                </div>

                <div class="menu-section" [class.active-parent]="hasActiveRoute(enterprisesMenuPaths)">
                    <button type="button" class="nav-item nav-toggle" (click)="toggleSection('enterprises')"
                        [class.active]="hasActiveRoute(enterprisesMenuPaths)">
                        <span class="material-symbols-rounded nav-icon">apartment</span>
                        <span class="nav-label">Organisation</span>
                        <span class="material-symbols-rounded chevron"
                            [class.open]="isExpanded('enterprises')">expand_more</span>
                    </button>

                    <div class="submenu" [class.open]="isExpanded('enterprises') || hasSearchTerm">
                        <a *ngFor="let item of filteredEnterprisesMenuItems" class="submenu-item"
                            [routerLink]="item.path" routerLinkActive="active"
                            [routerLinkActiveOptions]="{ exact: true }">
                            <span class="submenu-dot"></span>
                            <span>{{ item.label }}</span>
                        </a>
                    </div>
                </div>

                <div class="menu-section" [class.active-parent]="hasActiveRoute(settingsMenuPaths)">
                    <button type="button" class="nav-item nav-toggle" (click)="toggleSection('settings')"
                        [class.active]="hasActiveRoute(settingsMenuPaths)">
                        <span class="material-symbols-rounded nav-icon">settings</span>
                        <span class="nav-label">Parametres</span>
                        <span class="material-symbols-rounded chevron"
                            [class.open]="isExpanded('settings')">expand_more</span>
                    </button>

                    <div class="submenu" [class.open]="isExpanded('settings') || hasSearchTerm">
                        <a *ngFor="let item of filteredSettingsMenuItems" class="submenu-item" [routerLink]="item.path"
                            routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                            <span class="submenu-dot"></span>
                            <span>{{ item.label }}</span>
                        </a>
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button type="button" class="nav-item nav-item-logout" (click)="logout()">
                    <span class="material-symbols-rounded nav-icon">logout</span>
                    <span class="nav-label">Deconnexion</span>
                </button>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <h1>Tableau de bord coach</h1>
                <p>Bienvenue dans votre espace de gestion</p>
            </div>

            <div class="topbar-right">
                <div class="search-box">
                    <input type="text" placeholder="Rechercher..." [(ngModel)]="searchTerm"
                        (keyup.enter)="searchAndNavigate()" />
                </div>

                <div class="coach-profile">
                    <div class="coach-avatar">
                        <img src="assets/img/coaches/aa.png" alt="Coach logo" class="coach-avatar-image" />
                    </div>
                </div>
            </div>
        </div>

        <section class="content-section">
            <div class="content-card">
                <p class="search-empty-state" *ngIf="hasSearchTerm && !hasSearchResults">
                    Aucun menu trouvé pour "{{ searchTerm }}".
                </p>
                <router-outlet></router-outlet>
            </div>
        </section>
    </div>
</div>

<div class="logout-modal-overlay" *ngIf="showLogoutModal">
    <div class="logout-modal">
        <div class="logout-modal-header">
            <h2>CONFIRMATION</h2>
            <button type="button" class="close-modal-btn" (click)="cancelLogout()">×</button>
        </div>

        <div class="logout-modal-body">
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
        </div>

        <div class="logout-modal-footer">
            <button type="button" class="cancel-btn-modal" (click)="cancelLogout()">Annuler</button>
            <button type="button" class="confirm-btn-modal" (click)="confirmLogout()">Se déconnecter</button>
        </div>
    </div>
</div>
