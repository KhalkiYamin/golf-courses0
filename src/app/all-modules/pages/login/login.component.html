<!-- Page Content -->
<div class="content">
    <div class="container">

        <div class="row">
            <div class="col-md-8 offset-md-2">

                <!-- Register Tab Content -->
                <div class="account-content">
                    <div class="row align-items-center justify-content-center">
                        <div class="col-md-7 col-lg-6 login-left">
                            <img src="assets/img/login-banner.png" class="img-fluid"
                                alt="Académie Sportive Inscription">
                        </div>
                        <div class="col-md-12 col-lg-6 login-right">
                            <div class="login-header">
                                <h3>Inscription <span>Académie Sportive</span></h3>
                            </div>

                            <form action="/api/auth/login" method="POST" id="registerForm">
                                <!-- Nom -->
                                <div class="form-group form-focus">
                                    <input type="text" class="form-control floating" id="nom" name="nom" required>
                                    <label class="focus-label">Nom</label>
                                </div>

                                <!-- Prénom -->
                                <div class="form-group form-focus">
                                    <input type="text" class="form-control floating" id="prenom" name="prenom" required>
                                    <label class="focus-label">Prénom</label>
                                </div>

                                <!-- Email -->
                                <div class="form-group form-focus">
                                    <input type="email" class="form-control floating" id="email" name="email" required>
                                    <label class="focus-label">Email</label>
                                </div>

                                <!-- Mot de passe -->
                                <div class="form-group form-focus">
                                    <input type="password" class="form-control floating" id="password" name="password"
                                        required>
                                    <label class="focus-label">Mot de passe</label>
                                </div>

                                <!-- Téléphone -->
                                <div class="form-group form-focus">
                                    <input type="tel" class="form-control floating" id="telephone" name="telephone">
                                    <label class="focus-label">Téléphone</label>
                                </div>

                                <!-- Rôle (select) - Seulement Coach et Athlète -->
                                <div class="form-group form-focus">
                                    <select class="form-control floating" id="role" name="role" required>
                                        <option value="" disabled selected>--- Sélectionnez votre rôle ---</option>
                                        <option value="COACH">🎯 Coach</option>
                                        <option value="ATHLETE">💪 Athlète</option>
                                    </select>
                                    <label class="focus-label">Vous êtes ?</label>
                                </div>

                                <!-- Champs dynamiques pour Coach -->
                                <div id="coachFields" style="display: none;">
                                    <div class="form-group form-focus">
                                        <input type="text" class="form-control floating" id="specialite"
                                            name="specialite" placeholder="Ex: Football">
                                        <label class="focus-label">Spécialité</label>
                                    </div>
                                    <div class="form-group form-focus">
                                        <input type="number" class="form-control floating" id="experience"
                                            name="experience" min="0" max="50" placeholder="5">
                                        <label class="focus-label">Années d'expérience</label>
                                    </div>
                                </div>

                                <!-- Champs dynamiques pour Athlète -->
                                <div id="athleteFields" style="display: none;">
                                    <div class="form-group form-focus">
                                        <input type="text" class="form-control floating" id="sport" name="sport"
                                            placeholder="Ex: Football">
                                        <label class="focus-label">Sport pratiqué</label>
                                    </div>
                                    <div class="form-group form-focus">
                                        <select class="form-control floating" id="niveau" name="niveau">
                                            <option value="" disabled selected></option>
                                            <option value="DEBUTANT">🌟 Débutant</option>
                                            <option value="INTERMEDIAIRE">⭐⭐ Intermédiaire</option>
                                            <option value="CONFIRME">⭐⭐⭐ Confirmé</option>
                                            <option value="PROFESSIONNEL">⭐⭐⭐⭐ Professionnel</option>
                                        </select>
                                        <label class="focus-label">Niveau</label>
                                    </div>
                                </div>

                                <!-- Champ caché pour enabled (true par défaut dans l'entité) -->
                                <input type="hidden" name="enabled" value="true">

                                <!-- Bouton d'inscription -->
                                <button class="btn btn-primary btn-block btn-lg login-btn" type="submit">
                                    S'inscrire
                                </button>

                                <!-- Séparateur -->
                                <div class="login-or">
                                    <span class="or-line"></span>
                                    <span class="span-or">ou</span>
                                </div>

                                <!-- Connexion sociale -->
                                <div class="row form-row social-login">
                                    <div class="col-6">
                                        <a href="#" class="btn btn-facebook btn-block">
                                            <i class="fab fa-facebook-f mr-1"></i> Facebook
                                        </a>
                                    </div>
                                    <div class="col-6">
                                        <a href="#" class="btn btn-google btn-block">
                                            <i class="fab fa-google mr-1"></i> Google
                                        </a>
                                    </div>
                                </div>

                                <!-- Lien vers connexion -->
                                <div class="text-center dont-have">
                                    Déjà un compte ? <a href="/login">Se connecter</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- /Register Tab Content -->

            </div>
        </div>

    </div>
</div>
<!-- /Page Content -->

<!-- Script pour gérer l'affichage dynamique des champs -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        console.log('Script chargé');

        const roleSelect = document.getElementById('role');
        const coachFields = document.getElementById('coachFields');
        const athleteFields = document.getElementById('athleteFields');

        if (roleSelect) {
            console.log('Select trouvé');

            // Fonction pour gérer l'affichage
            function toggleFields() {
                console.log('Rôle changé:', roleSelect.value);

                // Cacher tous les champs
                coachFields.style.display = 'none';
                athleteFields.style.display = 'none';

                // Désactiver les champs requis pour éviter les problèmes de validation
                document.querySelectorAll('#coachFields input, #coachFields select, #athleteFields input, #athleteFields select').forEach(field => {
                    field.required = false;
                });

                // Afficher selon le rôle
                switch (roleSelect.value) {
                    case 'COACH':
                        coachFields.style.display = 'block';
                        document.querySelectorAll('#coachFields input, #coachFields select').forEach(field => {
                            if (field.id !== 'experience' || field.value) {
                                field.required = true;
                            }
                        });
                        break;
                    case 'ATHLETE':
                        athleteFields.style.display = 'block';
                        document.querySelectorAll('#athleteFields input, #athleteFields select').forEach(field => {
                            field.required = true;
                        });
                        break;
                }
            }

            // Ajouter l'événement
            roleSelect.addEventListener('change', toggleFields);

            // Exécuter une première fois si une valeur est déjà sélectionnée
            if (roleSelect.value) {
                toggleFields();
            }
        } else {
            console.error('Select non trouvé');
        }
    });

    // Gestion de la soumission du formulaire
    document.getElementById('registerForm').addEventListener('submit', function (e) {
        e.preventDefault();

        // Récupérer les valeurs
        const formData = {
            nom: document.getElementById('nom').value,
            prenom: document.getElementById('prenom').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            telephone: document.getElementById('telephone').value,
            role: document.getElementById('role').value,
            enabled: true
        };

        // Validation
        if (!formData.nom || !formData.prenom || !formData.email || !formData.password || !formData.role) {
            alert('Veuillez remplir tous les champs obligatoires');
            return;
        }

        if (formData.password.length < 6) {
            alert('Le mot de passe doit contenir au moins 6 caractères');
            return;
        }

        // Ajouter les champs spécifiques au rôle
        if (formData.role === 'COACH') {
            formData.specialite = document.getElementById('specialite').value;
            formData.experience = document.getElementById('experience').value;

            if (!formData.specialite) {
                alert('Veuillez entrer votre spécialité');
                return;
            }
        } else if (formData.role === 'ATHLETE') {
            formData.sport = document.getElementById('sport').value;
            formData.niveau = document.getElementById('niveau').value;

            if (!formData.sport || !formData.niveau) {
                alert('Veuillez remplir tous les champs pour le profil athlète');
                return;
            }
        }

        console.log('Données à envoyer au backend:', formData);

        // Simulation d'envoi au backend Spring Boot
        fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erreur réseau');
                }
                return response.json();
            })
            .then(data => {
                console.log('Succès:', data);
                alert('Inscription réussie ! Bienvenue dans l\'Académie Sportive 🎉');
                window.location.href = '/login';
            })
            .catch((error) => {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'inscription. Veuillez réessayer.');
            });
    });
</script>
