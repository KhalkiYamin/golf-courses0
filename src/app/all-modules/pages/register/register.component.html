<div class="row">
    <div class="col-md-8 offset-md-2">

        <div class="account-content">
            <div class="row align-items-center justify-content-center">

                <div class="col-md-7 col-lg-6 login-left">
                    <img src="assets/img/login-banner.png" class="img-fluid" alt="Académie Sportive Inscription">
                </div>

                <div class="col-md-12 col-lg-6 login-right">
                    <div class="login-header">
                        <h3>Inscription <span>Académie Sportive</span></h3>
                    </div>

                    <form (ngSubmit)="submit()" novalidate>

                        <div class="form-group form-focus">
                            <input type="text" class="form-control floating" [(ngModel)]="nom" name="nom" required>
                            <label class="focus-label">Nom</label>
                        </div>

                        <div class="form-group form-focus">
                            <input type="text" class="form-control floating" [(ngModel)]="prenom" name="prenom"
                                required>
                            <label class="focus-label">Prénom</label>
                        </div>

                        <div class="form-group form-focus">
                            <input type="email" class="form-control floating" [(ngModel)]="email" name="email" required>
                            <label class="focus-label">Email</label>
                        </div>

                        <div class="form-group form-focus">
                            <input type="password" class="form-control floating" [(ngModel)]="password" name="password"
                                required>
                            <label class="focus-label">Mot de passe</label>
                        </div>

                        <div class="form-group form-focus">
                            <input type="tel" class="form-control floating" [(ngModel)]="telephone" name="telephone">
                            <label class="focus-label">Téléphone</label>
                        </div>

                        <div class="form-group form-focus">
                            <select class="form-control floating" [(ngModel)]="role" name="role"
                                (change)="onRoleChange()" required>
                                <option value="" disabled>--- Sélectionnez votre rôle ---</option>
                                <option value="COACH">🎯 Coach</option>
                                <option value="ATHLETE">💪 Athlète</option>
                            </select>
                            <label class="focus-label">Vous êtes ?</label>
                        </div>

                        <div *ngIf="role === 'COACH'">
                            <div class="form-group">
                                <label class="mb-2">Spécialité</label>
                                <select class="form-control" [(ngModel)]="specialiteId" name="specialiteId" required>
                                    <option [ngValue]="null">Choisir une spécialité</option>
                                    <option *ngFor="let c of categories" [ngValue]="c.id">
                                        {{ c.title }}
                                    </option>
                                </select>
                            </div>

                            <div class="form-group form-focus">
                                <input type="number" class="form-control floating" [(ngModel)]="experience"
                                    name="experience" min="0" max="50">
                                <label class="focus-label">Années d'expérience</label>
                            </div>
                        </div>

                        <div *ngIf="role === 'ATHLETE'">
                            <div class="form-group">
                                <label class="mb-2">Sport pratiqué</label>
                                <select class="form-control" [(ngModel)]="sportId" name="sportId" required>
                                    <option [ngValue]="null">Choisir un sport</option>
                                    <option *ngFor="let c of categories" [ngValue]="c.id">
                                        {{ c.title }}
                                    </option>
                                </select>
                            </div>

                            <div class="form-group form-focus">
                                <select class="form-control floating" [(ngModel)]="niveau" name="niveau" required>
                                    <option value="" disabled>-- Choisir --</option>
                                    <option value="DEBUTANT">🌟 Débutant</option>
                                    <option value="INTERMEDIAIRE">⭐⭐ Intermédiaire</option>
                                    <option value="CONFIRME">⭐⭐⭐ Confirmé</option>
                                    <option value="PROFESSIONNEL">⭐⭐⭐⭐ Professionnel</option>
                                </select>
                                <label class="focus-label">Niveau</label>
                            </div>
                        </div>

                        <div *ngIf="successMsg" class="alert alert-success">
                            {{ successMsg }}
                        </div>

                        <div *ngIf="errorMsg" class="alert alert-danger">
                            {{ errorMsg }}
                        </div>

                        <button class="btn btn-primary btn-block btn-lg login-btn" type="submit" [disabled]="loading">
                            {{ loading ? "Inscription..." : "S'inscrire" }}
                        </button>

                        <div class="text-center dont-have">
                            Déjà un compte ? <a routerLink="/pages/login">Se connecter</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>

    </div>
</div>
