<div class="admin-page">
    <div class="layout">

        <aside class="sidebar">
            <div class="brand">
                <div class="logo">AS</div>
                <div>
                    <div class="brand-name">Académie</div>
                    <div class="brand-sub">Admin Panel</div>
                </div>
            </div>

            <nav class="nav">
                <a class="nav-item" routerLink="/golf-advisors/advisors-dashboard"
                    routerLinkActive="active">Dashboard</a>
                <a class="nav-item" routerLink="/golf-advisors/batch" routerLinkActive="active">Validation Coach</a>
                <a class="nav-item" routerLink="/golf-advisors/users" routerLinkActive="active">Utilisateurs</a>
                <a class="nav-item" routerLink="/golf-advisors/categories" routerLinkActive="active">Sports &
                    Niveaux</a>
                <a class="nav-item" routerLink="/admin/payments" routerLinkActive="active">Paiements</a>
                <a class="nav-item" routerLink="/admin/settings" routerLinkActive="active">Paramètres</a>
                <a class="nav-item" (click)="showLogoutModal = true" style="cursor: pointer;">Logout</a>
            </nav>
        </aside>

        <main class="main">

            <header class="topbar">
                <div>
                    <h1 class="title">Espace Administration</h1>
                </div>
                <div class="top-actions">
                    <input class="search" type="text" placeholder="Rechercher..." />
                    <div class="avatar">Y</div>
                </div>
            </header>

            <div class="content-container" style="padding: 20px;">
                <router-outlet></router-outlet>
            </div>

        </main>
    </div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal fade show" tabindex="-1"
    [ngStyle]="{display: showLogoutModal ? 'block' : 'none', background: showLogoutModal ? 'rgba(0,0,0,0.3)' : 'transparent'}"
    *ngIf="showLogoutModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content"
            style="background: white; padding: 20px; border-radius: 8px; max-width: 450px; margin: 10% auto;">
            <div class="modal-header"
                style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <h5 class="modal-title" style="margin: 0;">Confirmation</h5>
                <button type="button" class="close" (click)="showLogoutModal = false"
                    style="border: none; background: transparent; font-size: 1.5rem; cursor: pointer;">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body" style="padding: 20px 0;">
                <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
            </div>
            <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" (click)="showLogoutModal = false"
                    style="padding: 8px 16px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #f8f9fa;">
                    Annuler
                </button>
                <button type="button" (click)="onLogout()"
                    style="padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: #dc3545; color: white;">
                    Se déconnecter
                </button>
            </div>
        </div>
    </div>
</div>
