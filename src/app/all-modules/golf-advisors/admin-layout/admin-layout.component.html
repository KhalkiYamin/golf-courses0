<div class="admin-page">
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-box">
                    <img src="assets/img/Admin.png" alt="Logo" class="logo-img">
                </div>
                <div class="brand-text">
                    <div class="brand-name">Académie Sportive</div>
                    <div class="brand-sub">Admin</div>
                </div>
            </div>

            <nav class="nav">
                <a class="nav-item" routerLink="/golf-advisors/advisors-dashboard" routerLinkActive="active">
                    Dashboard
                </a>

                <a class="nav-item" routerLink="/golf-advisors/batch" routerLinkActive="active">
                    Validation Coach
                </a>

                <a class="nav-item" routerLink="/golf-advisors/users" routerLinkActive="active">
                    Utilisateurs
                </a>

                <a class="nav-item" routerLink="/golf-advisors/categories" routerLinkActive="active">
                    Sports & Niveaux
                </a>

                <a class="nav-item" routerLink="/admin/payments" routerLinkActive="active">
                    Paiements
                </a>

                <a class="nav-item" routerLink="/golf-advisors/ressources-sportives" routerLinkActive="active">
                    Ressources sportives
                </a>

                <a class="nav-item" routerLink="/golf-advisors/parametres" routerLinkActive="active">
                    Paramètres
                </a>

                <a class="nav-item logout-link" (click)="showLogoutModal = true">
                    Logout
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="topbar">
                <div>
                    <h1 class="title">Espace Administration</h1>
                </div>

                <div class="top-actions">
                    <input class="search" type="text" placeholder="Rechercher..." />
                    <div class="avatar">Y</div>
                </div>
            </header>

            <div class="content-container">
                <router-outlet></router-outlet>
            </div>
        </main>

    </div>
</div>

<!-- Logout Modal -->
<div class="custom-modal" *ngIf="showLogoutModal">
    <div class="modal-box">
        <div class="modal-header">
            <h5>Confirmation</h5>
            <button class="close-btn" (click)="showLogoutModal = false">&times;</button>
        </div>

        <div class="modal-body">
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
        </div>

        <div class="modal-footer">
            <button class="cancel-btn" (click)="showLogoutModal = false">Annuler</button>
            <button class="logout-btn" (click)="onLogout()">Se déconnecter</button>
        </div>
    </div>
</div>
