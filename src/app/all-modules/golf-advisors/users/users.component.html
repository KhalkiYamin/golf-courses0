<div class="users-page">

    <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
    </div>

    <div class="users-card">
        <div class="users-header">
            <div class="users-title">
                <h2>Gestion des utilisateurs</h2>
            </div>

            <div class="users-actions">
                <input
                    type="text"
                    class="search-input"
                    placeholder="Recherche..."
                    [(ngModel)]="searchTerm"
                    name="searchTerm"
                >

                <button class="add-btn" (click)="addUser()">
                    + Ajouter
                </button>
            </div>
        </div>

        <div class="users-filters">
            <button
                class="tab-btn"
                [class.active]="selectedTab === 'ATHLETE'"
                (click)="switchTab('ATHLETE')"
            >
                Athlètes
            </button>

            <button
                class="tab-btn"
                [class.active]="selectedTab === 'COACH'"
                (click)="switchTab('COACH')"
            >
                Coachs
            </button>

            <select
                *ngIf="selectedTab === 'COACH'"
                class="filter-select"
                [(ngModel)]="coachFilter"
                (change)="setCoachFilter(coachFilter)"
                name="coachFilter"
            >
                <option value="TOUS">Tous</option>
                <option value="VALIDÉ">Validé</option>
                <option value="EN ATTENTE">En attente</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th *ngIf="selectedTab === 'ATHLETE'">Sport</th>
                        <th *ngIf="selectedTab === 'ATHLETE'">Niveau</th>
                        <th *ngIf="selectedTab === 'COACH'">Spécialité</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let user of displayedUsers" (click)="selectUser(user)">
                        <td>{{ user.prenom }} {{ user.nom }}</td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.telephone }}</td>

                        <td *ngIf="selectedTab === 'ATHLETE'">{{ user.sport?.title }}</td>
                        <td *ngIf="selectedTab === 'ATHLETE'">{{ user.niveau }}</td>

                        <td *ngIf="selectedTab === 'COACH'">
                            {{ getSpecialiteLabel(user) }}
                        </td>

                        <td>
                            <span
                                class="status-badge"
                                [class.pending]="getUserStatus(user) === 'EN ATTENTE'"
                            >
                                {{ getUserStatus(user) }}
                            </span>
                        </td>

                        <td class="action-buttons">
                            <button
                                *ngIf="user.role === 'COACH' && getUserStatus(user) === 'EN ATTENTE'"
                                class="edit-btn"
                                (click)="validateCoach(user); $event.stopPropagation()"
                            >
                                Valider
                            </button>

                            <button
                                class="delete-btn"
                                (click)="confirmDelete(user); $event.stopPropagation()"
                            >
                                Supprimer
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-box">
            <button
                class="page-btn"
                *ngFor="let p of [].constructor(totalPages); let i = index"
                (click)="goToPage(i + 1)"
            >
                {{ i + 1 }}
            </button>
        </div>
    </div>
</div>

<div class="modal" *ngIf="showAddModal">
    <div class="modal-box">
        <h4>Ajouter utilisateur</h4>

        <input class="form-control mb-2" placeholder="Nom" [(ngModel)]="newUser.nom" name="nom">
        <input class="form-control mb-2" placeholder="Prénom" [(ngModel)]="newUser.prenom" name="prenom">
        <input class="form-control mb-2" placeholder="Email" [(ngModel)]="newUser.email" name="email">
        <input type="password" class="form-control mb-2" placeholder="Mot de passe" [(ngModel)]="password" name="password">
        <input class="form-control mb-2" placeholder="Téléphone" [(ngModel)]="newUser.telephone" name="telephone">

        <select class="form-control mb-2" [(ngModel)]="newUser.role" name="role" (change)="onRoleChange()">
            <option value="ATHLETE">Athlète</option>
            <option value="COACH">Coach</option>
        </select>

        <div *ngIf="newUser.role === 'ATHLETE'">
            <select class="form-control mb-2" [(ngModel)]="sportId" name="sportId">
                <option [ngValue]="null">Choisir un sport</option>
                <option *ngFor="let c of categories" [ngValue]="c.id">
                    {{ c.title }}
                </option>
            </select>

            <select class="form-control mb-2" [(ngModel)]="niveau" name="niveau">
                <option value="" disabled>Choisir un niveau</option>
                <option *ngFor="let level of niveauOptions" [value]="level">
                    {{ level }}
                </option>
            </select>
        </div>

        <div *ngIf="newUser.role === 'COACH'">
            <select class="form-control mb-2" [(ngModel)]="specialiteId" name="specialiteId">
                <option [ngValue]="null">Choisir une spécialité</option>
                <option *ngFor="let c of categories" [ngValue]="c.id">
                    {{ c.title }}
                </option>
            </select>

            <input
                type="number"
                class="form-control mb-2"
                placeholder="Années d'expérience"
                [(ngModel)]="experience"
                name="experience"
                min="0"
            >
        </div>

        <div class="modal-actions">
            <button class="btn btn-success" (click)="saveUser()">Enregistrer</button>
            <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        </div>
    </div>
</div>
