<div class="content">
    <div class="container">
        <div class="row">
            <div class="col-md-10 offset-md-2">

                <div class="account-content">
                    <div class="row align-items-center justify-content-center">
                        <div class="col-md-7 col-lg-6 login-left">
                            <img src="assets/img/login-banner.png" class="img-fluid" alt="Vérification du code">
                        </div>

                        <div class="col-md-12 col-lg-6 login-right">
                            <div class="login-header">
                                <h3>Vérification du code</h3>
                                <p>Entrez l’email et le code reçu par email</p>
                            </div>

                            <form (ngSubmit)="submit()" novalidate>
                                <div class="form-group form-focus">
                                    <input type="email" class="form-control floating" [(ngModel)]="email" name="email"
                                        required>
                                    <label class="focus-label">Email</label>
                                </div>

                                <div class="form-group form-focus">
                                    <input type="text" class="form-control floating" [(ngModel)]="code" name="code"
                                        required>
                                    <label class="focus-label">Code</label>
                                </div>

                                <div *ngIf="errorMsg" class="alert alert-danger alert-custom">
                                    <i class="fa fa-exclamation-circle"></i> {{ errorMsg }}
                                </div>

                                <div *ngIf="successMsg" class="alert alert-success alert-custom">
                                    <i class="fa fa-check-circle"></i> {{ successMsg }}
                                </div>

                                <button class="btn btn-primary btn-block btn-lg login-btn" type="submit"
                                    [disabled]="loading">
                                    <span *ngIf="!loading">Vérifier le code</span>
                                    <span *ngIf="loading">
                                        <i class="fa fa-spinner fa-spin"></i> Vérification...
                                    </span>
                                </button>

                                <div class="text-center forgot-link">
                                    <a routerLink="/pages/forgot-password">Renvoyer un code</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
